<HEAD>
	<TITLE>Academic Project: Automatamania | Online Curriculum</TITLE>
    <meta charset="UTF-8">

	<SCRIPT src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.10/lodash.js"></SCRIPT>
	<SCRIPT src="https://cytoscape.org/cytoscape.js-edgehandles/cytoscape-edgehandles.js"></SCRIPT>
    <SCRIPT type="text/javascript" src="automatamania.js"></SCRIPT>
    <!-- Global site tag (gtag.js) - Google Analytics -->

      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'UA-127322788-1');

	<STYLE>
		html, body { font-family: helvetica neue, helvetica, liberation sans, arial, sans-serif; font-size: 14px; height: 100%; width: 100%; padding: 0; margin: 0;}
		#cy { position: absolute; left: 0; top: 0; bottom: 0; right: 0; z-index: 999; }
		h1 { opacity: 1; font-size: 1em; font-weight: bold; }
		#buttons { position: absolute; right: 0; bottom: 0; z-index: 99999; }
		.btn-group button {
				border: 1px solid green; /* Green border */
				padding: 0px 24px; /* Some padding */
				cursor: pointer; /* Pointer/hand icon */
				width: 90%; /* Set a width if needed */ /* was 50% */
				display: block; /* Make the buttons appear below each other */
				margin-bottom: 10px;
		}
		.btn-group button:hover { background-color: lightcyan; }
		ul { list-style: none; padding-left: 10px; }
        /* added by us */
        #stats li { padding-bottom: 10px; }
        #stats li span { font-weight: bold; }
        .btn-group input { width: 90%; }
        #results span { font-weight: bold; }
</STYLE>
</HEAD>

<BODY ONLOAD="onLoadAction(event)">
	
<DIV ID="menu" STYLE="position: fixed; top: 0px; left: 0px; height: 100%; width: 220px; background: pink; height: 100%; overflow-x: hidden; overflow-y: scroll">
	
<hr><hr><h1 style="font-size: 26px;">Automatamania</h1>
<hr><hr>
<b> Statistics: </b> <br />
<div id="stats">
    <ul>
        <li>Number of States: <span id="number-states">N/A</span></li>
        <li>Number of Accept States: <span id="number-accept-states">N/A</span></li>
        <li>Size of the Alphabet: <span id="size-alphabet">N/A</span></li>
        <li>Is deterministic? <span id="fa-deterministic">N/A</span></li>
        <li>Selected State: <span id="selected-state">N/A</span></li>
    </ul>
</div>
<hr><hr>
<b> Commands: </b> <br />
<DIV class="btn-group">
    <UL>
        <li><span style="cursor: pointer" onclick="showInfo()">&#8505; Basic Informations</span><br><br></li>
        <li><BUTTON ID="reachable" ONCLICK="reachableAction(event)">Reachable</BUTTON>
        <li><BUTTON ID="productive" ONCLICK="productiveAction(event)">Productive</BUTTON>
        <li><BUTTON ID="useful" ONCLICK="usefulAction(event)">Useful</BUTTON>
        <li><input type="number" id="generate" placeholder="Words Length" style="text-align: center"> <button onclick="generateAction(event)">Generate</button>
        <li><input type="text" id="word" placeholder="Word" style="text-align: center"> <button onclick="acceptAction(event)">Accept?</button>
        <li><button onclick="stepAction(event, 'st')">Step</button>
        <li><button onclick="animationAction(event)">Animation</button>
        <li>Upload an automaton here:<INPUT ID="file-select" TYPE='file' ACCEPT='application/json' ONCHANGE='fileSelectAction(event)'>
        <li><br>Example automatons:<br>
            <a href="/academic-projects/automatamania/abc.json" target="_blank">ABC</a> and 
            <a href="/academic-projects/automatamania/afn.json" target="_blank">AFN</a>
        </li>
    </UL>

    <hr><hr>
</DIV>
<div id="results">
    <b>Results:</b> <br />
    <ul>
        <li id="results-result"></li>
    </ul>
</div>

<DIV id="cy" STYLE="position: fixed; top: 0px; left: 220px; background: lightcyan;"></DIV>

</BODY>
</HTML>
