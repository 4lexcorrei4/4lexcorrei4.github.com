<!DOCTYPE>
<html>
    <head>
        <title>CLIP Cadeiras</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="SHORTCUT ICON" href="https://clip.fct.unl.pt/imagem/formata%E7%E3o/clip.ico" />
        <link rel="stylesheet" type="text/css" href="../css/grid.css"/>
        <!-- Global site tag (gtag.js) - Google Analytics -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=UA-127322788-1"></script>
        <script>
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', 'UA-127322788-1');
        </script>
    </head>
    <body style="margin: 0; overflow: hidden; background-image: linear-gradient(rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.9)), url(https://www.fct.unl.pt/sites/www.fct.unl.pt/themes/fct_unl_pt_2015/images/logo.png); background-position: center; background-repeat: no-repeat; background-size: 50%">
        <form style="text-align: center; margin-top: 40vh">
            <div class="row">
                <div class="col span-2-of-7"></div>
                <div class="col span-1-of-7">
                    <p class="option">Ano Letivo</p>
                    <select id="cYear" onchange="loadUrl()">
                        <option value="-1" disabled selected>Escolher</option>
                        <option value="2019">2018/19</option>
                        <option value="2018">2017/18</option>
                        <option value="2017">2016/17</option>
                        <option value="2016">2015/16</option>
                        <option value="2015">2014/15</option>
                        <option value="2014">2013/14</option>
                    </select>
                </div>
                <div class="col span-1-of-7">
                    <p class="option">Periodo Letivo</p>
                    <select id="cTime" onchange="changeSubsject()">
                        <option value="-1" disabled selected>Escolher</option>
                        <option value="s1">1º Semestre</option>
                        <option value="s2">2º Semestre</option>
                        <option value="t">Trimestre</option>
                    </select>
                </div>
                <div class="col span-1-of-7">
                    <p class="option">Cadeira</p>
                    <select id="cSubject" onchange="loadUrl()">
                        <option value="-1" disabled selected>Escolher Periodo Letivo</option>
                    </select>
                </div>
                <div class="col span-2-of-7"></div>
            </div>
        </form>
        <!--<p style="text-align: center; margin-top: 5vh">link da pagina atualiza quando se escolhe a cadeira ou se muda de ano</p>-->
        <h1 style="text-align: center"><a href="#" id="cUrl" target=""><img src="https://clip.fct.unl.pt/imagem/formata%E7%E3o/clip.ico" style="border-radius: 50%; height: 20px; width: auto"> SEM PAGINA</a></h1>
        <style>
            select {
                border-radius: 20px;
                padding-left: 5px;
            }
            
            p.option {
                font-weight: bold;
                text-transform: uppercase;
            }
            
            a:link,
            a:visited {
                padding: 1%;
                background-color: rgba(255, 255, 255, 0.7);
                box-shadow: 0 0 5px gray;
                border-radius: 20px;
                border: 1px solid gray;
                text-decoration: none;
                color: #000;
                transition: color 0.2s, background-color 0.2s;
            }
            
            a:hover,
            a:active {
                background-color: rgba(0, 0, 0, 0.1);
                color: #205260;
            }
        </style>
        <script>
            
            /*function changeTime() {
                var timeType = document.getElementById("cTimeType").value;
                
                if (timeType == "s")
                    document.getElementById("cTime").innerHTML = "<option value='-1' disabled selected>Escolher</option><option value='1'>1</option><option value='2'>2</option>";
                else
                    document.getElementById("cTime").innerHTML = "<option value='-1' disabled>Escolher</option><option value='2' selected>2</option>";
                
                changeSubsject();
                loadUrl();
            }*/
            
            function changeSubsject() {
                var time = document.getElementById("cTime").value;
                
                if (time == "s1") {
                    document.getElementById("cSubject").innerHTML = "<option value='-1' disabled selected>Escolher</option><optgroup label='1º Ano'><option value='11505' title='Algebra Linear e Geometria Analitica'>ALGA</option><option value='11504' title='Analise Matematica I'>AM1</option><option value='7996' title='Analise Matematica II'>AM2</option><option value='10637' title='Introducao a Programacao'>IP</option><option value='5294' title='Sistemas Logicos'>SL</option></optgroup><optgroup label='2º Ano'><option value='11154' title='Algoritmos e Estruturas de Dados'>AED</option><option value='7663' title='Fisica'>F.INF.</option><option value='11155' title='Fundamentos de Sistemas de Operacao'>FSO</option><option value='7336' title='Logica Computacional'>LC</option></optgroup>";
                } else if (time == "s2") {
                    document.getElementById("cSubject").innerHTML = "<option value='-1' disabled selected>Escolher</option><optgroup label='1º Ano'><option value='11152' title='Arquitetura de Computadores'>AC</option><option value='11504' title='Analise Matematica I'>AM1</option><option value='7996' title='Analise Matematica II'>AM2</option><option value='3629' title='Matematica Discreta'>MD</option><option value='11153' title='Programacao Orientada pelos Objetos'>POO</option></optgroup><optgroup label='2º Ano'><option value='10640' title='Bases de Dados'>BD</option><option value='8147' title='Linguagens e Ambientes de Programacao'>LAP</option><option value='9414' title='Probabilidades e Estatistica E'>PEE</option><option value='2468' title='Teoria da Computacao'>TC</option></optgroup>";
                } else if (time == "t") {
                    document.getElementById("cSubject").innerHTML = "<option value='-1' disabled selected>Escolher</option><optgroup label='1º Ano'><option value='10352' title='Competencias Transversais para Ciencias e Tecnologia'>CTCT</option></optgroup><optgroup label='2º Ano'><option value='10358' title='Ciencia, Tecnologia e Sociedade'>CTS</option></optgroup>";
                } else {
                    document.getElementById("cSubject").innerHTML = "<option value='-1' disabled selected>Escolher Periodo Letivo</option>";
                }
                
                loadUrl();
            }
            
            function loadUrl() {
                var year = document.getElementById("cYear").value;
                var time = document.getElementById("cTime").value;
                var subject = document.getElementById("cSubject").value;
                
                if (!(year == "-1" || time == "-1" || subject == "-1")) {
                    var timeType = null;
                    
                    if (time == "s1") {
                        timeType = "s";
                        time = "1";
                    } else if (time == "s2") {
                        timeType = "s";
                        time = "2";
                    } else if (time == "t") {
                        timeType = "t";
                        time = "2";
                    }
                    
                    var url = "https://clip.fct.unl.pt/utente/eu/aluno/informa%E7%E3o_acad%E9mica/curso/unidade_curricular/unidade_curricular?tipo_de_per%EDodo_lectivo=" + timeType + "&curso=472&ano_lectivo=" + year + "&per%EDodo_lectivo=" + time + "&institui%E7%E3o=97747&unidade_curricular=" + subject;
                    document.getElementById("cUrl").href = url;
                    document.getElementById("cUrl").target = "_blank";
                    document.getElementById("cUrl").innerHTML = "<img src='https://clip.fct.unl.pt/imagem/formata%E7%E3o/clip.ico' style='border-radius: 50%; height: 20px; width: auto'> ABRIR PAGINA";
                } else {
                    document.getElementById("cUrl").href = "#";
                    document.getElementById("cUrl").target = "";
                    document.getElementById("cUrl").innerHTML = "<img src='https://clip.fct.unl.pt/imagem/formata%E7%E3o/clip.ico' style='border-radius: 50%; height: 20px; width: auto'> SEM PAGINA";
                }
            }
        </script>
    </body>
</html>
